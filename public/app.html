<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plan a Trip — Steven's Travel Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #0F1117; color: #E8EAF0; }
    a { text-decoration: none; color: inherit; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* sidebar */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #161B27;
      border-right: 1px solid #252D3D;
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 2rem; display: block; }
    .logo span { color: #4F8EF7; }

    .sidebar-nav { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }
    .sidebar-link {
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      color: #8892A4;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .sidebar-link:hover, .sidebar-link.active { background: #1E2535; color: #E8EAF0; }

    .sidebar-bottom { border-top: 1px solid #252D3D; padding-top: 1.2rem; }
    .user-info { font-size: 0.82rem; color: #8892A4; margin-bottom: 0.8rem; }
    .btn-logout {
      width: 100%; padding: 0.55rem;
      background: none; border: 1px solid #252D3D;
      border-radius: 8px; color: #8892A4;
      font-size: 0.82rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #FF6B6B; color: #FF6B6B; }

    /* main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 2.5rem;
      min-width: 0;
    }

    .tab { display: none; }
    .tab.active { display: block; }

    .page-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.4rem; }
    .page-sub { color: #8892A4; margin-bottom: 2rem; font-size: 0.95rem; }

    /* planner */
    .planner-wrap {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 2rem;
      align-items: start;
    }

    .form-card {
      background: #161B27;
      border: 1px solid #252D3D;
      border-radius: 14px;
      padding: 1.8rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1.1rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: #8892A4; }
    .form-group input, .form-group select {
      padding: 0.75rem 0.9rem;
      background: #1E2535;
      border: 1.5px solid #252D3D;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #E8EAF0;
      outline: none;
      width: 100%;
    }
    .form-group input:focus, .form-group select:focus { border-color: #4F8EF7; }
    .form-group select option { background: #1E2535; }

    .btn-primary {
      width: 100%; padding: 0.8rem;
      background: #4F8EF7; color: white;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { background: #3A7AE8; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-card {
      background: #161B27;
      border: 1px solid #252D3D;
      border-radius: 14px;
      padding: 1.8rem;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder { text-align: center; color: #8892A4; }
    .placeholder span { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; }

    .loading { text-align: center; color: #8892A4; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #252D3D;
      border-top-color: #4F8EF7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .itinerary { width: 100%; align-self: flex-start; }
    .itin-header { margin-bottom: 1.2rem; }
    .itin-header h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .itin-tag {
      display: inline-block; padding: 0.18rem 0.7rem;
      background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.2);
      border-radius: 100px; font-size: 0.72rem; color: #4F8EF7; margin-right: 0.4rem;
    }
    .itin-body {
      color: #8892A4; font-size: 0.9rem; line-height: 1.8;
      margin: 1.2rem 0; max-height: 500px; overflow-y: auto;
    }
    .itin-body h2, .itin-body h3 { color: #E8EAF0; margin: 1rem 0 0.4rem; }
    .itin-body strong { color: #E8EAF0; }
    .itin-body li { margin-left: 1.4rem; margin-bottom: 0.2rem; }
    .btn-outline {
      padding: 0.6rem 1.4rem; background: none;
      border: 1.5px solid #252D3D; border-radius: 8px;
      color: #8892A4; font-size: 0.85rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-outline:hover { border-color: #4F8EF7; color: #4F8EF7; }

    /* trips */
    .trips-list { display: flex; flex-direction: column; gap: 1.2rem; }
    .trips-empty { color: #8892A4; text-align: center; padding: 3rem; }
    .trip-card {
      background: #161B27; border: 1px solid #252D3D;
      border-radius: 14px; padding: 1.5rem; transition: border-color 0.3s;
    }
    .trip-card:hover { border-color: #4F8EF7; }
    .trip-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
    .trip-top h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
    .trip-meta { font-size: 0.75rem; color: #8892A4; }
    .btn-del { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; transition: opacity 0.2s; }
    .btn-del:hover { opacity: 1; }
    .trip-preview { font-size: 0.86rem; color: #8892A4; line-height: 1.6; margin-bottom: 0.8rem; }
    .btn-expand { background: none; border: none; color: #4F8EF7; font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .trip-full { margin-top: 0.8rem; font-size: 0.86rem; color: #8892A4; line-height: 1.8; }

    .error { color: #FF6B6B; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="layout">

  <!-- sidebar -->
  <aside class="sidebar">
    <a href="/" class="logo">Steven's <span>Travel Guide</span></a>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" onclick="showTab('plan', this)">Plan a Trip</button>
      <button class="sidebar-link" onclick="showTab('trips', this)">My Trips</button>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info" id="usernameDisplay">Loading...</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <!-- main -->
  <main class="main">

    <!-- plan tab -->
    <div id="planTab" class="tab active">
      <h1 class="page-title">Plan a New Trip</h1>
      <p class="page-sub">Tell our AI where you want to go and get a full itinerary in seconds.</p>

      <div class="planner-wrap">
        <div class="form-card">
          <form id="planForm">
            <div class="form-group">
              <label>Destination</label>
              <input type="text" id="destination" placeholder="e.g. Tokyo, Japan" required/>
            </div>
            <div class="form-group">
              <label>Dates or Duration</label>
              <input type="text" id="dates" placeholder="e.g. 7 days or July 1–7"/>
            </div>
            <div class="form-group">
              <label>Budget</label>
              <select id="budget">
                <option value="budget">Budget — Under $1,000</option>
                <option value="moderate" selected>Moderate — $1,000–$3,000</option>
                <option value="luxury">Luxury — $3,000+</option>
              </select>
            </div>
            <div class="form-group">
              <label>Interests</label>
              <input type="text" id="interests" placeholder="e.g. food, history, nightlife"/>
            </div>
            <button type="submit" class="btn-primary" id="planBtn">Generate Itinerary </button>
            <div class="error" id="planError"></div>
          </form>
        </div>

        <div class="result-card" id="resultCard">
          <div class="placeholder">
            <span></span>
            <p>Your itinerary will appear here</p>
          </div>
        </div>
      </div>
    </div>

    <!-- trips tab -->
    <div id="tripsTab" class="tab">
      <h1 class="page-title">My Saved Trips</h1>
      <p class="page-sub">All your generated itineraries in one place.</p>
      <div class="trips-list" id="tripsList">
        <div class="trips-empty">Loading...</div>
      </div>
    </div>

  </main>
</div>

<script>
  async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { window.location.href = '/login'; return; }
    const data = await res.json();
    document.getElementById('usernameDisplay').textContent = ' ' + data.username;
  }

  function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    el.classList.add('active');
    if (tab === 'trips') loadTrips();
  }

  document.getElementById('planForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('planBtn');
    const card = document.getElementById('resultCard');
    const err = document.getElementById('planError');
    err.textContent = '';

    btn.textContent = 'Generating...';
    btn.disabled = true;
    card.innerHTML = '<div class="loading"><div class="spinner"></div><p>AI is planning your trip...</p></div>';

    const destination = document.getElementById('destination').value;
    const dates = document.getElementById('dates').value;
    const budget = document.getElementById('budget').value;
    const interests = document.getElementById('interests').value;

    try {
      const res = await fetch('/api/plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ destination, dates, budget, interests })
      });
      const data = await res.json();

      if (data.success) {
        const fmt = data.itinerary
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/^## (.*$)/gm, '<h3>$1</h3>')
          .replace(/^# (.*$)/gm, '<h2>$1</h2>')
          .replace(/^\* (.+)$/gm, '<li>$1</li>')
          .replace(/^- (.+)$/gm, '<li>$1</li>')
          .replace(/\n/g, '<br/>');

        card.innerHTML = `
          <div class="itinerary">
            <div class="itin-header">
              <h2> ${destination}</h2>
              <span class="itin-tag">${dates || 'Flexible'}</span>
              <span class="itin-tag">${budget} budget</span>
            </div>
            <div class="itin-body">${fmt}</div>
            <button class="btn-outline" onclick="showTab('trips', document.querySelectorAll('.sidebar-link')[1])">View Saved Trips →</button>
          </div>`;
      } else {
        card.innerHTML = '<div class="placeholder"><span>X</span><p>' + data.error + '</p></div>';
      }
    } catch (err2) {
      card.innerHTML = '<div class="placeholder"><span>X</span><p>Something went wrong. Try again.</p></div>';
    }

    btn.textContent = 'Generate Itinerary ';
    btn.disabled = false;
  });

  async function loadTrips() {
    const list = document.getElementById('tripsList');
    list.innerHTML = '<div class="trips-empty">Loading...</div>';
    try {
      const res = await fetch('/api/trips');
      const trips = await res.json();
      if (trips.length === 0) { list.innerHTML = '<div class="trips-empty">No trips yet. Plan one! </div>'; return; }
      list.innerHTML = trips.map(t => `
        <div class="trip-card" id="trip-${t.id}">
          <div class="trip-top">
            <div>
              <h3> ${t.destination}</h3>
              <div class="trip-meta">${t.dates || 'Flexible'} · ${t.budget || 'any'} budget · ${new Date(t.created_at).toLocaleDateString()}</div>
            </div>
            <button class="btn-del" onclick="deleteTrip(${t.id})">Delete</button>
          </div>
          <div class="trip-preview">${t.itinerary.substring(0, 200)}...</div>
          <button class="btn-expand" onclick="toggleTrip(${t.id})">Read full itinerary ↓</button>
          <div class="trip-full" id="tf-${t.id}" style="display:none">${t.itinerary.replace(/\n/g,'<br/>')}</div>
        </div>`).join('');
    } catch { list.innerHTML = '<div class="trips-empty">Failed to load trips.</div>'; }
  }

  function toggleTrip(id) {
    const el = document.getElementById('tf-' + id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  async function deleteTrip(id) {
    if (!confirm('Delete this trip?')) return;
    await fetch('/api/trips/' + id, { method: 'DELETE' });
    document.getElementById('trip-' + id).remove();
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  }

  init();
</script>
</body>
</html>
