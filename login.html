<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Steven's Travel Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
/* reset */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }

/* variables */
:root {
  --bg: #0F1117;
  --bg-2: #161B27;
  --bg-3: #1E2535;
  --text: #E8EAF0;
  --text-muted: #8892A4;
  --accent: #4F8EF7;
  --accent-2: #F7934F;
  --border: #252D3D;
  --radius: 10px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

a { text-decoration: none; color: inherit; }

/* logo */
.logo {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}
.logo span { color: var(--accent); }

/* buttons */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0.75rem 1.8rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  text-decoration: none;
}
.btn-primary:hover { background: #3A7AE8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,0.3); }

.btn-outline {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.75rem 1.8rem;
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  text-decoration: none;
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

.btn-lg { padding: 0.9rem 2.2rem; font-size: 1rem; }
.btn-full { width: 100%; }

/* ===== LANDING PAGE ===== */
.landing-page .nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: rgba(15,17,23,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 1rem 0;
}
.landing-page .nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.landing-page .nav-links {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.landing-page .nav-links a { color: var(--text-muted); font-size: 0.9rem; transition: color 0.2s; }
.landing-page .nav-links a:hover { color: var(--text); }

.hero-landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4rem;
  max-width: 1100px;
  margin: 0 auto;
  padding: 8rem 2rem 4rem;
}

.hero-landing-content { flex: 1; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0.35rem 1rem;
  background: rgba(79,142,247,0.1);
  border: 1px solid rgba(79,142,247,0.3);
  border-radius: 100px;
  font-size: 0.8rem;
  color: var(--accent);
  margin-bottom: 1.5rem;
}

.hero-landing-content h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}
.hero-landing-content h1 .accent { color: var(--accent); }

.hero-landing-content p {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 500px;
  margin-bottom: 2.5rem;
  line-height: 1.8;
}

.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

.hero-landing-visual { flex: 0 0 340px; }

.visual-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
}
.visual-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  margin-bottom: 1.2rem;
  font-size: 0.95rem;
}
.visual-item {
  padding: 0.6rem 0.8rem;
  background: var(--bg-3);
  border-radius: 8px;
  margin-bottom: 0.6rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.visual-footer {
  margin-top: 1rem;
  font-size: 0.75rem;
  color: var(--accent);
  text-align: center;
}

/* features */
.features {
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  padding: 5rem 2rem;
  text-align: center;
}
.features h2 {
  font-family: var(--font-display);
  font-size: 2rem;
  margin-bottom: 3rem;
}
.container { max-width: 1100px; margin: 0 auto; }
.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
.feature-card {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  transition: transform 0.3s, border-color 0.3s;
}
.feature-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.feature-icon { font-size: 2rem; display: block; margin-bottom: 1rem; }
.feature-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
.feature-card p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.7; }

.footer {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 2rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}
.footer strong { color: var(--text); }

/* ===== AUTH PAGES ===== */
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.auth-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
  width: 100%;
}
.auth-left {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4rem;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}
.auth-left .logo { margin-bottom: 2.5rem; display: block; }
.auth-left h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem; }
.auth-left > p { color: var(--text-muted); margin-bottom: 2rem; }

.auth-form { display: flex; flex-direction: column; gap: 1.2rem; }

.form-group { display: flex; flex-direction: column; gap: 0.4rem; }
.form-group label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 0.85rem 1rem;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.93rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
}
.form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group select option { background: var(--bg-2); }

.error-msg { color: #FF6B6B; font-size: 0.85rem; min-height: 1rem; }
.auth-switch { margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); }
.auth-switch a { color: var(--accent); }

.auth-right {
  background: linear-gradient(135deg, #1a2240 0%, #0F1117 100%);
  border-left: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem;
}
.auth-visual { text-align: center; }
.auth-visual h2 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 1rem; }
.auth-visual p { color: var(--text-muted); max-width: 300px; }

/* ===== APP PAGE ===== */
.app-page {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 240px;
}
.sidebar .logo { margin-bottom: 2.5rem; }
.sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
.sidebar-link {
  padding: 0.75rem 1rem;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.2s;
  cursor: pointer;
}
.sidebar-link:hover, .sidebar-link.active { background: var(--bg-3); color: var(--text); }
.sidebar-bottom { border-top: 1px solid var(--border); padding-top: 1.5rem; }
.user-info { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
.btn-logout {
  width: 100%;
  padding: 0.6rem;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.btn-logout:hover { border-color: #FF6B6B; color: #FF6B6B; }

.main-content {
  margin-left: 240px;
  padding: 3rem;
  min-height: 100vh;
  word-wrap: break-word;
  overflow-wrap: break-word;
  overflow-x: hidden;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.page-header { margin-bottom: 2.5rem; }
.page-header h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem; }
.page-header p { color: var(--text-muted); }

/* planner */
.planner-grid { display: grid; grid-template-columns: 380px 1fr; gap: 2rem; align-items: start; }
.planner-form-wrap {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
}
.planner-form { display: flex; flex-direction: column; gap: 1.2rem; }

.itinerary-wrap {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  min-height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.itinerary-placeholder { text-align: center; color: var(--text-muted); }
.itinerary-placeholder span { font-size: 3rem; display: block; margin-bottom: 1rem; }

.itinerary-loading { text-align: center; color: var(--text-muted); }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

.itinerary-result { width: 100%; align-self: flex-start; }
.itinerary-header { margin-bottom: 1.5rem; }
.itinerary-header h2 { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 0.75rem; }
.itinerary-tag {
  display: inline-block;
  padding: 0.2rem 0.75rem;
  background: rgba(79,142,247,0.1);
  border: 1px solid rgba(79,142,247,0.2);
  border-radius: 100px;
  font-size: 0.75rem;
  color: var(--accent);
  margin-right: 0.5rem;
}
.itinerary-body {
  color: var(--text-muted);
  font-size: 0.92rem;
  line-height: 1.8;
  margin-bottom: 1.5rem;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.itinerary-body h2, .itinerary-body h3 { color: var(--text); margin: 1rem 0 0.5rem; }
.itinerary-body li { margin-left: 1.5rem; margin-bottom: 0.25rem; }
.itinerary-body strong { color: var(--text); }

/* trips list */
.trips-list { display: flex; flex-direction: column; gap: 1.5rem; }
.trips-empty { color: var(--text-muted); text-align: center; padding: 3rem; }
.trip-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.8rem;
  transition: border-color 0.3s;
}
.trip-card:hover { border-color: var(--accent); }
.trip-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.trip-card-header h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
.trip-meta { font-size: 0.78rem; color: var(--text-muted); }
.btn-delete { background: none; border: none; cursor: pointer; font-size: 1.1rem; opacity: 0.5; transition: opacity 0.2s; }
.btn-delete:hover { opacity: 1; }
.trip-preview { font-size: 0.88rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1rem; }
.btn-expand { background: none; border: none; color: var(--accent); font-size: 0.85rem; cursor: pointer; font-family: var(--font-body); }
.trip-full { margin-top: 1rem; font-size: 0.88rem; color: var(--text-muted); line-height: 1.8; white-space: pre-wrap; }

/* responsive */
@media (max-width: 900px) {
  .auth-container { grid-template-columns: 1fr; }
  .auth-right { display: none; }
  .app-page { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding: 1.5rem; }
  .planner-grid { grid-template-columns: 1fr; }
  .hero-landing { flex-direction: column; }
  .hero-landing-visual { display: none; }
}

</style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <a href="/" class="logo">Steven's <span>Travel Guide</span></a>
      <h1>Welcome back</h1>
      <p>Sign in to continue planning your trips.</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="your password" required/>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn-primary btn-full">Sign In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
    <div class="auth-right">
      <div class="auth-visual">
        <h2>Where do you want to go?</h2>
        <p>Your saved trips are waiting for you.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/app';
        } else {
          errorMsg.textContent = data.error;
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Try again.';
      }
    });
  </script>
</body>
</html>
